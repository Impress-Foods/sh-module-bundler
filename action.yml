name: "Sh module bundler"
description: "Bundles third-party modules into an Odoo.sh deployment repo"

inputs:
  config_path:
    description: "Path to repos.yaml inside the calling workspace"
    required: false
    default: "repos.yml"
  pipeline_path:
    description: "Path to pipeline.yaml inside the calling workspace"
    required: false
    default: "pipeline.yml"
  event_type:
    description: "Event type"
    required: false
    default: ""
  destination_path:
    description: "Destination location for compiled addons"
    required: false
    default: "./compiled_addons"
  target_branch:
    description: "Branch to push compiled addons to in the deployment repo"
    required: true
  git_user_name:
    description: "Git commit author name"
    required: false
    default: "Odoo.sh Bundler"
  git_user_email:
    description: "Git commit author email"
    required: false
    default: "bundler@odoo.sh"
  repo:
    description: "Source repo"
    required: true

runs:
  using: "docker"
  image: "docker://ghcr.io/impress-foods/sh-module-bundler:latest"
