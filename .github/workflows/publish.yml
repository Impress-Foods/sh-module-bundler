name: Build and Publish Action Image

on:
  push:
    tags:
      - "v*" # Triggers on semantic version tags (e.g., v1.0.0, v1.2.0)

# Grant the workflow permissions to write packages to your GitHub Organization/Account
permissions:
  packages: write
  contents: read

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Docker Buildx to enable advanced caching features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate against the GitHub Container Registry (ghcr.io)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically extract metadata and generate tags (e.g., :latest, :1.2.0, :main)
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build the Dockerfile and push it to GHCR with the extracted tags
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Optimize speed using GitHub Actions caching mechanisms
          cache-from: type=gha
          cache-to: type=gha,mode=max
